global:
  resolve_timeout: 5m
  smtp_from: ${SMTP_FROM}
  smtp_smarthost: ${SMTP_SMARTHOST}
  smtp_auth_username: ${SMTP_AUTH_USERNAME}
  smtp_auth_password: ${SMTP_AUTH_PASSWORD}
  smtp_require_tls: true

route:
  receiver: "email-alerts"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "email-alerts"
    email_configs:
      - to: ${ALERT_EMAIL_TO}
        send_resolved: true
